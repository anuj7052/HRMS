name: Build and deploy Node.js app to Azure Web App - smarthrms-backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/main_smarthrms-backend.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install all dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Build TypeScript
        working-directory: backend
        run: npm run build

      - name: Install production dependencies only
        working-directory: backend
        run: npm ci --omit=dev

      - name: Generate Prisma client for production (Linux)
        working-directory: backend
        run: npx prisma generate

      - name: Prepare deploy package
        run: |
          mkdir -p /tmp/deploy
          cp -r backend/dist /tmp/deploy/
          cp backend/package.json /tmp/deploy/
          cp -r backend/prisma /tmp/deploy/
          tar -czf /tmp/deploy/node_modules.tar.gz -C backend/node_modules .
          printf 'NodePackageManagerBuildType = "npm"\npackageDir = ""\nsourceBuildType = "nodejs"\ncompressedNodeModulesFile = "node_modules.tar.gz"\n' > /tmp/deploy/oryx-manifest.toml

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: /tmp/deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CD92D75AB7B3410B8D97261C36E3CCE7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B209DEE3D7DC46E0923DACA8D0D946CC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9E6B25A4EAC446018B2769E1CE36EC79 }}

      - name: Disable Oryx build
        run: |
          az webapp config appsettings set \
            --name smarthrms-backend \
            --resource-group smarthrms-rg \
            --settings WEBSITE_SKIP_ORYX_BUILD=true SCM_DO_BUILD_DURING_DEPLOYMENT=false

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'smarthrms-backend'
          slot-name: 'Production'
          package: ./deploy
